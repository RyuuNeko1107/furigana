# Dependabot — 依存ライブラリの自動更新 PR 生成
# 詳細: https://docs.github.com/code-security/dependabot

version: 2
updates:
  # Rust crate の依存 (workspace.Cargo.toml と各 crate の Cargo.toml を見る)
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "rust"
    # API breaking が大きい major bump は手動対応に回す (Dependabot 再生産を抑制)。
    # 必要になったら ignore を外す or 個別に PR 作る。
    ignore:
      - dependency-name: "toml"
        update-types: ["version-update:semver-major"]   # 0.8 → 1.x は spec 違いで loader 変更要
      - dependency-name: "directories"
        update-types: ["version-update:semver-major"]   # 5 → 6 は ProjectDirs API 変更可能性
    # 関連 crate を 1 PR にまとめてレビュー負担を下げる
    groups:
      tokio-stack:
        patterns:
          - "tokio*"
          - "tower*"
          - "hyper*"
          - "axum*"
          - "reqwest*"
      lindera:
        patterns:
          - "lindera*"
      serde-stack:
        patterns:
          - "serde*"
          - "toml"
      misc:
        update-types:
          - "patch"

  # GitHub Actions (.github/workflows/*.yml の actions/checkout@v4 等)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(ci)"
    labels:
      - "dependencies"
      - "ci"
