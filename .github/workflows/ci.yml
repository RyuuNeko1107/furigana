name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    # 毎週月曜 09:00 JST = 00:00 UTC に security audit を回す
    # (Dependabot の補完: cargo crate の advisory DB に新規エントリが入ったら検知)
    - cron: "0 0 * * 1"

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo / target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.os }}

      - name: Build (workspace)
        run: cargo build --workspace --all-targets

      - name: Test (workspace)
        run: cargo test --workspace

  lint:
    name: Lint (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain (stable + components)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo / target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: lint

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

  license:
    name: License audit (cargo-about)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo / target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: license

      - name: Install cargo-about
        run: cargo install --locked --features cli cargo-about

      # about.toml の accepted リストに無い license を持つ依存が増えたら fail。
      # OSS 化で copyleft (GPL/AGPL/LGPL) が混入してないかを CI で検知する。
      - name: Check license compatibility
        run: cargo about generate about.hbs -o /tmp/NOTICE.md

      # commit 済みの NOTICE.md と CI で生成したものに差があれば、
      # 開発者が cargo about generate を忘れた可能性 (drift 警告)。
      - name: Detect NOTICE.md drift
        run: |
          if ! diff -q NOTICE.md /tmp/NOTICE.md >/dev/null; then
            echo "::warning::NOTICE.md is out of sync with current dependencies."
            echo "Run \`cargo about generate about.hbs -o NOTICE.md\` and commit."
            diff NOTICE.md /tmp/NOTICE.md | head -50 || true
          fi

  audit:
    name: Security audit (cargo-audit)
    # push だけでなく pull_request / schedule でも走る (毎週 advisory check)
    runs-on: ubuntu-latest
    # advisory DB の更新で突然 fail するケースは「依存側の問題」なので、
    # blocking job ではなく warn 扱いにする (continue-on-error)。
    # 致命的な advisory が出たら手動で対応する運用。
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo / target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: audit

      - name: Install cargo-audit
        run: cargo install --locked cargo-audit

      - name: Run security audit
        run: cargo audit --deny warnings

  corpus:
    name: Corpus regression (ja-furigana-dict)
    # 辞書 PR で過去に通っていた読みが壊れていないか自動 check。
    # ja-furigana-dict/tests/corpus/should_read.toml の各 case を release binary で
    # 走らせる。Lindera + IPADIC の build が重いので毎回はやらず、push のみ。
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - name: Checkout ja-furigana
        uses: actions/checkout@v6
        with:
          path: ja-furigana

      - name: Checkout ja-furigana-dict
        uses: actions/checkout@v6
        with:
          repository: RyuuNeko1107/ja-furigana-dict
          path: ja-furigana-dict

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo / target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: corpus
          workspaces: ja-furigana

      - name: Build release binary
        working-directory: ja-furigana
        run: cargo build --release -p ja-furigana-cli

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # corpus は ja-furigana-dict 側の master のスナップショットを使う。
      # 配布 (dict pull) を介さず repo 直下の core/ rules/ を flat 配置に変換して
      # `--data-dir` で渡す。
      - name: Stage dict / rules into flat data/ layout
        run: |
          mkdir -p data-staging/data
          cp -r ja-furigana-dict/core/* data-staging/data/ 2>/dev/null || true
          cp -r ja-furigana-dict/rules/* data-staging/data/ 2>/dev/null || true
          ls -la data-staging/data/

      - name: Run corpus runner against should_read.toml
        run: |
          python3 ja-furigana-dict/tools/run_corpus.py \
            ja-furigana-dict/tests/corpus/should_read.toml \
            --binary "$GITHUB_WORKSPACE/ja-furigana/target/release/furigana" \
            --data-dir "$GITHUB_WORKSPACE/data-staging" \
            -v
