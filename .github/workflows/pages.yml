name: Deploy WASM demo to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'crates/furigana/**'
      - 'crates/furigana-wasm/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同時デプロイは 1 つだけ (古いものは cancel して最新 master を反映)
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build WASM + bundle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ja-furigana
        uses: actions/checkout@v4

      # furigana-dict の master 最新 (unihan.toml / jukugo/general.toml) を
      # bundle して、CORS 警告なしで demo から fetch できるように。
      - name: Checkout ja-furigana-dict
        uses: actions/checkout@v4
        with:
          repository: RyuuNeko1107/ja-furigana-dict
          path: ja-furigana-dict

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo / target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: pages-wasm

      - name: Install wasm-pack
        run: cargo install --locked wasm-pack

      - name: Build wasm-pack (web target, release)
        run: wasm-pack build crates/furigana-wasm --target web --release

      - name: Prepare _site directory
        run: |
          mkdir -p _site/pkg _site/data
          cp crates/furigana-wasm/examples/index.html _site/index.html
          cp crates/furigana-wasm/pkg/ja_furigana_wasm.js     _site/pkg/
          cp crates/furigana-wasm/pkg/ja_furigana_wasm_bg.wasm _site/pkg/
          cp crates/furigana-wasm/pkg/ja_furigana_wasm.d.ts   _site/pkg/ || true
          # 同じ origin から取れるように dict を bundle (CORS 回避 + 安定動作)
          cp ja-furigana-dict/core/unihan.toml         _site/data/unihan.toml
          cp ja-furigana-dict/core/jukugo/general.toml _site/data/jukugo-general.toml
          cp ja-furigana-dict/core/jukugo/four_char.toml _site/data/jukugo-four_char.toml
          ls -la _site _site/pkg _site/data

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
