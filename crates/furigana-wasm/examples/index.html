<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>ja-furigana WASM demo</title>
  <style>
    body { font-family: system-ui, -apple-system, "Segoe UI", "Hiragino Sans", sans-serif;
           max-width: 720px; margin: 2rem auto; padding: 0 1rem; line-height: 1.6; }
    h1 { margin-bottom: 0.2rem; }
    .sub { color: #666; font-size: 0.9rem; margin-bottom: 1.5rem; }
    textarea { width: 100%; min-height: 4rem; font-size: 1rem; padding: 0.5rem; }
    .btns { margin: 0.5rem 0; }
    button { padding: 0.4rem 1rem; margin-right: 0.5rem; cursor: pointer; }
    .result { background: #f6f8fa; padding: 0.7rem 1rem; border-radius: 6px;
              margin-top: 0.5rem; white-space: pre-wrap; word-break: break-all; min-height: 1.6em; }
    .result-label { font-size: 0.85rem; color: #888; margin-top: 0.7rem; }
    .status { font-size: 0.85rem; color: #666; }
    .status.ready { color: #2c7; }
    .status.err { color: #c33; }
    .add-row { display: flex; gap: 0.5rem; margin: 0.5rem 0; }
    .add-row input { flex: 1; padding: 0.4rem; font-size: 1rem; }
  </style>
</head>
<body>
  <h1>ja-furigana <small>(WASM demo)</small></h1>
  <p class="sub">
    Lindera + IPADIC を embed した WebAssembly で動作する。
    <code>Furigana::minimal()</code> ベース、`addReading` で辞書を追加可能。
  </p>

  <p class="status" id="status">⏳ wasm をロード中... (約 57 MB、初回は時間がかかります)</p>

  <h3>入力</h3>
  <textarea id="input">灰桜の散る道</textarea>

  <div class="btns">
    <button id="btn-ruby" disabled>ruby</button>
    <button id="btn-hira" disabled>hiragana</button>
  </div>

  <div class="result-label">ruby:</div>
  <div class="result" id="out-ruby"></div>

  <div class="result-label">hiragana:</div>
  <div class="result" id="out-hira"></div>

  <h3>辞書追加</h3>
  <div class="add-row">
    <input id="add-surface" placeholder="表層 (例: 灰桜)" />
    <input id="add-reading" placeholder="読み (例: ハイザクラ)" />
    <button id="btn-add" disabled>追加</button>
  </div>
  <p class="status">登録済み: <span id="dict-size">0</span> 件</p>

  <script type="module">
    import init, { WasmFurigana } from "../pkg/ja_furigana_wasm.js";

    const status = document.getElementById("status");
    let f = null;

    try {
      await init();
      f = new WasmFurigana();
      status.textContent = "✅ ロード完了";
      status.className = "status ready";
      ["btn-ruby", "btn-hira", "btn-add"].forEach(id => {
        document.getElementById(id).disabled = false;
      });
      // 初期辞書を 1 件流し込んで動作確認しやすく
      f.addReading("灰桜", "ハイザクラ");
      document.getElementById("dict-size").textContent = f.dictSize;
    } catch (e) {
      status.textContent = "❌ ロード失敗: " + e.message;
      status.className = "status err";
      throw e;
    }

    const inputEl = document.getElementById("input");
    document.getElementById("btn-ruby").addEventListener("click", () => {
      document.getElementById("out-ruby").textContent = f.toRuby(inputEl.value);
    });
    document.getElementById("btn-hira").addEventListener("click", () => {
      document.getElementById("out-hira").textContent = f.toHiragana(inputEl.value);
    });
    document.getElementById("btn-add").addEventListener("click", () => {
      const s = document.getElementById("add-surface").value.trim();
      const r = document.getElementById("add-reading").value.trim();
      if (!s || !r) return;
      f.addReading(s, r);
      document.getElementById("dict-size").textContent = f.dictSize;
      document.getElementById("add-surface").value = "";
      document.getElementById("add-reading").value = "";
    });
  </script>
</body>
</html>
